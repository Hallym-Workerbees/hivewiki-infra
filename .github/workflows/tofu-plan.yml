name: OpenTofu Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".terraform.lock.hcl"

jobs:
  plan:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        working_directory:
          - environments/dev
          - environments/prod
          - environments/shared

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_dockerhub_access_token: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
      TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
      TF_VAR_ghcr_access_token: ${{ secrets.GHCR_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # 5.0.1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu init
        run: tofu init -input=false -reconfigure

      - name: OpenTofu plan
        run: tofu plan -no-color -input=false
